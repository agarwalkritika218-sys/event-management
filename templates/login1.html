<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<div class="auth-container">
    <div class="auth-card" id="login-card">

        <!-- Switch Buttons -->
        <div class="switch-box">
            <button type="button" class="switch-btn" onclick="showUser()">User</button>
            <button type="button" class="switch-btn" onclick="showAdmin()">Admin</button>
        </div>

        <!-- Title -->
        <h2 id="form-title">User Login</h2>

        <!-- Message -->
        {% if message %}
            <p class="message error">{{ message }}</p>
        {% endif %}

        <!-- Form -->
        <form id="loginForm" action="/login" method="POST">

            <input type="email" name="email" placeholder="Email address" required>

            <div class="password-box">
                <input type="password" id="login-password" name="password" placeholder="Password" required>
                <span class="toggle-password" onclick="toggleLoginPassword(this)">👁</span>
            </div>

            <button type="submit">Login</button>

        </form>

        <p class="auth-link">
            Don’t have an account?
            <a href="/register">Register here</a>
        </p>

    </div>
</div>

<script>
function toggleLoginPassword(el) {
    var password = document.getElementById("login-password");

    if (password.type === "password") {
        password.type = "text";
        el.innerText = "🙈";
    } else {
        password.type = "password";
        el.innerText = "👁";
    }
}

function showUser() {
    document.getElementById("form-title").innerText = "User Login";
    document.getElementById("loginForm").action = "/login";
    document.getElementById("login-card").classList.remove("admin-mode");
    document.getElementById("form-title").classList.remove("admin-title");
}

function showAdmin() {
    document.getElementById("form-title").innerText = "Admin Login";
    document.getElementById("loginForm").action = "/login";
    document.getElementById("login-card").classList.add("admin-mode");
    document.getElementById("form-title").classList.add("admin-title");
}
</script>

</body>
</html>
