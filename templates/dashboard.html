<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Eventify Dashboard</title>
 <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

<style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Segoe UI, sans-serif;
        }

        body{
            background:#f5f6fa;
        }

        .dashboard{
            display:flex;
        }

        /* HAMBURGER BUTTON */
        .menu-btn{
            position:fixed;
            top:10px;
            left:10px;
            font-size:28px;
            background:#6a1b9a;
            color:white;
            border:none;
            padding:10px 14px;
            border-radius:8px;
            z-index:2000;
            cursor:pointer;
            display:none;
        }

        /* SIDEBAR */
        .sidebar{
            width:220px;
            height:100vh;
            background:#6a1b9a;
            color:white;
            padding:30px 20px;
            position:fixed;
            left:0;
            top:0;
            transition:0.3s ease;
            z-index:1000;
        }

        .sidebar h2{
            text-align:center;
            margin-bottom:35px;
            font-size:22px;
        }

        .sidebar a{
            display:block;
            color:white;
            text-decoration:none;
            margin:18px 0;
            text-align:center;
            font-size:16px;
        }

        .sidebar a:hover{
            color:#f8d9ff;
        }

        /* MAIN CONTENT */
        .main-content{
            margin-left:220px;
            width:calc(100% - 220px);
            padding:40px;
        }

        .main-content h1{
            font-size:72px;
            color:#222;
            margin-bottom:10px;
            line-height:1.1;
        }

        .main-content p{
            font-size:18px;
            color:#666;
            margin-bottom:40px;
        }

        /* IMAGE GRID */
        .diamond-grid{
            display:flex;
            flex-direction:column;
            gap:25px;
            align-items:flex-start;
            margin-top:20px;
        }

        .diamond{
            width:320px;
            height:180px;
            overflow:hidden;
            border-radius:24px;
            background:white;
            box-shadow:0 8px 20px rgba(0,0,0,0.08);
        }

        .diamond img{
            width:100%;
            height:100%;
            object-fit:cover;
            display:block;
        }

        /* MOBILE */
        @media (max-width: 768px){

            .menu-btn{
                display:block;
            }

            .sidebar{
                transform:translateX(-100%);
                width:220px;
            }

            .sidebar.active{
                transform:translateX(0);
            }

            .main-content{
                margin-left:0;
                width:100%;
                padding:80px 20px 30px;
            }

            .main-content h1{
                font-size:48px;
                line-height:1.2;
                margin-bottom:12px;
            }

            .main-content p{
                font-size:16px;
                margin-bottom:30px;
            }

            .diamond-grid{
                display:flex;
                flex-direction:column;
                gap:18px;
                align-items:center;
            }

            
        }
         /* MOBILE IMAGE FIX */
         @media (max-width:768px){

            .diamond-grid{
              display:grid;
              grid-template-columns:1fr;
              gap:15px;
              padding:10px;
         }

            .diamond{
              width:100% !important;
              aspect-ratio:1/1;
              margin:0 !important;
              transform:none !important;
              border-radius:15px;
              overflow:hidden;
         }

           .diamond img{
              width:100%;
              height:100%;
              object-fit:cover;
    }
}
        /* DESKTOP */
        @media (min-width: 769px){
            .sidebar{
                transform:translateX(0) !important;
            }
        }
    </style>


</head>

<body>
<button class="menu-btn" onclick="toggleMenu()">☰</button>
<div class="dashboard">

<!-- SIDEBAR -->

<div class="sidebar" id="sidebar">

<h2>Eventify</h2>

<a href="{{ url_for('wedding') }}">Wedding</a>
<a href="{{ url_for('concerts') }}">Concerts</a>
 <a href="{{ url_for('cultural') }}">Cultural</a>
 <a href="{{ url_for('parties') }}">Parties</a>
<a href="{{ url_for('catering') }}">Catering</a>
<a href="{{ url_for('budget') }}">Budget</a>
<a href="{{ url_for('booking') }}">Booking</a>

</div>


<!-- MAIN -->

<div class="main-content">

<h1>Welcome to Eventify 💜</h1>

<p>Plan your events professionally and beautifully.</p>

<div class="diamond-grid">

<div class="diamond">
<img src="https://images.unsplash.com/photo-1519741497674-611481863552?w=900">
</div>

<div class="diamond">
<img src="https://images.unsplash.com/photo-1530103862676-de8c9debad1d?w=900">
</div>

<div class="diamond">
<img src="https://images.unsplash.com/photo-1507874457470-272b3c8d8ee2?w=900">
</div>

<div class="diamond">
<img src="https://img.freepik.com/free-vector/people-celebrating-holi-festival_52683-56305.jpg?semt=ais_hybrid&w=740&q=80
">
</div>

</div>

</div>

</div>
<script>
function toggleMenu(){
    document.getElementById("sidebar").classList.toggle("active");
}
</script>
</body>
</html>
