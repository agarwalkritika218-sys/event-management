<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Booking Page | Eventify</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Segoe UI, sans-serif;
    }

    body{
      background:#f5f5f5;
      padding:40px;
    }

    .booking-container{
      max-width:700px;
      margin:auto;
      background:white;
      padding:30px;
      border-radius:15px;
      box-shadow:0 8px 20px rgba(0,0,0,0.1);
    }

    h1{
      text-align:center;
      color:#6a1b9a;
      margin-bottom:25px;
    }

    form{
      display:flex;
      flex-direction:column;
      gap:18px;
    }

    label{
      font-weight:bold;
      margin-bottom:5px;
      display:block;
      color:#333;
    }

    input, select, textarea{
      width:100%;
      padding:12px;
      border:1px solid #ccc;
      border-radius:8px;
      font-size:16px;
    }

    textarea{
      resize:none;
      height:100px;
    }

    button{
      background:#6a1b9a;
      color:white;
      border:none;
      padding:14px;
      border-radius:8px;
      font-size:18px;
      cursor:pointer;
      transition:0.3s;
    }

    button:hover{
      background:#4a148c;
    }

    .message{
  width: 100%;
  margin-top: 12px;
  background: linear-gradient(90deg, #1faa4a, #28a745);
  color: white;
  padding: 14px;
  border-radius: 8px;
  text-align: center;
  font-size: 22px;
  font-weight: bold;
}

    .error{
      background:#e53935;
    }
    #amountDisplay{
    width: 100%;
    padding: 14px;
    border: 1px solid #ccc;
    border-radius: 10px;
    font-size: 16px;
    background: #fff;
    color: #222;
}
    .payment-modal{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.5);
    justify-content:center;
    align-items:center;
    z-index:999;
}

.payment-modal-content{
    background:white;
    padding:25px;
    border-radius:12px;
    text-align:center;
    width:90%;
    max-width:400px;
    position:relative;
}

.close-btn{
    position:absolute;
    top:10px;
    right:15px;
    font-size:25px;
    cursor:pointer;
}

.qr-img{
    width:200px;
    margin:10px 0;
}

.pay-btn{
    background:green;
    color:white;
    padding:10px;
    border:none;
    border-radius:6px;
    margin:5px;
}

.cancel-btn{
    background:red;
    color:white;
    padding:10px;
    border:none;
    border-radius:6px;
    margin:5px;
}
  </style>
</head>
<body>

 <div class="booking-container">
    <h1>Book Your Event</h1>


    <form id="bookingForm" action="/booking" method="POST">
      <input type="hidden" name="payment" id="paymentStatus" value="Pending">
      <div>
        <label>Full Name</label>
        <input type="text" name="fullName" placeholder="Enter your name" required>
      </div>

      <div>
        <label>Email Address</label>
        <input type="email" name="email" placeholder="Enter your email" required>
      </div>

      <div>
        <label>Phone Number</label>
        <input type="tel" name="phone" placeholder="Enter your phone number" required>
      </div>

      <div>
    <label>Event Type</label>
    <select name="eventType" required onchange="setAmount()">
        <option value="">Select Event Type</option>
        <option value="Wedding">Wedding</option>
        <option value="Birthday">Birthday</option>
        <option value="Concert">Concert</option>
        <option value="Cultural Event">Cultural Event</option>
    </select>
</div>

<!-- 👇 YEH YAHI ADD KARNA HAI -->
<div>
    <label>Advance Amount</label>
    <p id="amountDisplay" style="font-weight:bold; color:green;">₹0</p>
</div>
      <div>
        <label>Event Date</label>
        <input type="date" name="eventDate" required>
      </div>

      <div>
        <label>Number of Guests</label>
        <input type="number" name="guests" placeholder="Enter number of guests" required>
      </div>

      <div>
        <label>Venue Location</label>
        <input type="text" name="venue" placeholder="Enter venue location" required>
      </div>
      <div>
    <label>Catering Required</label>
    <select name="catering" required>
        <option value="">Select Option</option>
        <option value="Yes">Yes</option>
        <option value="No">No</option>
    </select>
</div>


      <div>
    <label>Special Requirements</label>
    <textarea name="requirements" placeholder="Write your requirements here..."></textarea>
</div>

<button type="button" onclick="showPayment()">BOOK NOW</button>

</div>
</form>
<!-- Payment Modal -->
<div id="paymentModal" class="payment-modal">
    <div class="payment-modal-content">
        <span class="close-btn" onclick="hidePayment()">&times;</span>

        <h3>Scan & Pay</h3>
        <p>Please scan the QR code to complete your payment.</p>

        <img src="{{ url_for('static', filename='images/scanner.jpeg') }}" alt="Payment QR" class="qr-img">

        <p><strong>UPI ID:</strong> agarwalkritika@oksbi</p>

        <div class="payment-buttons">
            <button type="button" class="pay-btn" onclick="donePayment()">Done Payment</button>
            <button type="button" class="cancel-btn" onclick="hidePayment()">Cancel</button>
        </div>
    </div>
</div>

<script>
  
function setAmount() {
    let eventType = document.querySelector('[name="eventType"]').value;
    let amount = 0;

    if (eventType === "Wedding") amount = 100000;
    else if (eventType === "Birthday") amount = 10000;
    else if (eventType === "Concert") amount = 100000;
    else if (eventType === "Cultural Event") amount = 50000;

    document.getElementById("amountDisplay").innerText = "₹" + amount;
}

function showPayment() {
    document.getElementById("paymentModal").style.display = "flex";
}

function hidePayment() {
    document.getElementById("paymentModal").style.display = "none";
}

function donePayment() {
    document.getElementById("paymentStatus").value = "Done";
    document.getElementById("bookingForm").submit();
}
</script>
</body>
</html>
